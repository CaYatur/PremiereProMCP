<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: sans-serif; font-size: 12px; padding: 8px; }
    button { margin-bottom: 8px; padding: 6px 10px; }
    textarea {
      width: 100%; height: 480px; font-family: monospace; font-size: 11px;
      white-space: pre; box-sizing: border-box;
    }
    #status { color: #888; margin-bottom: 6px; }
  </style>
</head>
<body>
  <button id="runBtn">Run Diagnostics (read-only, no project changes)</button>
  <button id="textTestBtn">Test Text Creation (creates a NEW throwaway test sequence, inserts Adobe's "Basic Title" MOGRT, tries to edit its text)</button>
  <button id="copyBtn">Copy Results to Clipboard</button>
  <div id="status">Not run yet.</div>
  <textarea id="output" readonly placeholder="Results will appear here after you click Run Diagnostics."></textarea>
  <script src="index.js"></script>
</body>
</html>
