<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PPMCP Text Bridge</title>
    <style>
      body {
        margin: 10px;
        font: 12px/1.4 system-ui, Segoe UI, sans-serif;
        background: #2b2b2b;
        color: #e8e8e8;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px;
        font-weight: 600;
      }
      #status {
        padding: 6px 8px;
        border-radius: 4px;
        background: #3a3a3a;
        margin-bottom: 8px;
      }
      #status.ok {
        background: #1e3d2f;
        color: #9fefc0;
      }
      #status.warn {
        background: #3d3a1e;
        color: #efe49f;
      }
      #status.err {
        background: #3d1e1e;
        color: #ef9f9f;
      }
      button {
        margin-right: 6px;
        margin-bottom: 6px;
        padding: 4px 10px;
        border: 1px solid #555;
        background: #404040;
        color: #eee;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover {
        background: #505050;
      }
      #log {
        margin-top: 8px;
        padding: 6px;
        height: 90px;
        overflow: auto;
        background: #1e1e1e;
        border: 1px solid #444;
        font: 10px/1.35 Consolas, monospace;
        white-space: pre-wrap;
      }
      .hint {
        color: #999;
        font-size: 11px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>PPMCP Text Bridge (optional)</h1>
    <div id="status">Starting…</div>
    <button id="reconnect">Reconnect</button>
    <button id="testPing">Ping ExtendScript</button>
    <p class="hint">
      Optional helper for real MOGRT text (AE templates). Core editing stays on the UXP plugin. Keep this panel open while using text_write with the legacy path. Relay: ws://127.0.0.1:8265
    </p>
    <div id="log"></div>
    <script src="./CSInterface.js"></script>
    <script src="./client.js"></script>
  </body>
</html>
